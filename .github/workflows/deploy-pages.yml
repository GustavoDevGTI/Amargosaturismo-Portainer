name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build static artifact
        shell: bash
        run: |
          mkdir -p _site
          cp index.html _site/
          cp wifi-publico.html _site/
          cp styles.css _site/
          cp script.js _site/
          cp logo_oficial_amargosa.png _site/
          if [ -f logo_principal_texto_branco.png ]; then
            cp logo_principal_texto_branco.png _site/
          fi
          if [ -d "sãojoão" ]; then
            cp -R "sãojoão" "_site/sãojoão"
          fi
          if [ -d "festival-de-forro" ]; then
            cp -R "festival-de-forro" "_site/festival-de-forro"
          fi
          if [ -d "carnaval-cultural" ]; then
            cp -R "carnaval-cultural" "_site/carnaval-cultural"
          fi
          if [ -d "Amargosacalendario" ]; then
            cp -R "Amargosacalendario" "_site/Amargosacalendario"
          fi
          if [ -d "formulario" ]; then
            cp -R "formulario" "_site/formulario"
          fi
          if [ -d "adminformulario" ]; then
            cp -R "adminformulario" "_site/adminformulario"
          fi
          cp -R public _site/public
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
